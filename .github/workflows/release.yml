name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: node scripts/package.js 7z

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          echo "version=$($pkg.version)" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            wps-addon-publish/kaiwu_${{ steps.version.outputs.version }}.7z

      - name: Copy to packages/
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $src = "wps-addon-publish/kaiwu_$version.7z"
          if (Test-Path $src) {
            Copy-Item $src "packages/" -Force
            # Update manifest
            $manifest = if (Test-Path "packages/manifest.json") {
              Get-Content "packages/manifest.json" | ConvertFrom-Json
            } else { @{ releases = @() } }
            $size = (Get-Item $src).Length
            $entry = @{
              version = $version
              tag = "v$version"
              date = (Get-Date).ToString("o")
              files = @(@{ name = "kaiwu_$version.7z"; size = $size })
            }
            $manifest.releases = @($manifest.releases | Where-Object { $_.version -ne $version })
            $manifest.releases = @($entry) + @($manifest.releases)
            $manifest | ConvertTo-Json -Depth 5 | Set-Content "packages/manifest.json" -Encoding UTF8
            Write-Host "✅ Updated packages/manifest.json"
          }

      - name: Commit packages
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/
          git diff --cached --quiet || git commit -m "build: update packages for v${{ steps.version.outputs.version }}"
          git push
