<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开悟</title>
    <link rel="stylesheet" href="styles/floating.css">
    <link rel="stylesheet" href="../taskpane/vendor/highlight-github.min.css">
    <script src="../taskpane/vendor/marked.min.js"></script>
    <script src="../taskpane/services/utils.js"></script>
    <script src="../taskpane/services/toast.js"></script>
    <script src="../taskpane/services/security.js"></script>
    <script src="../taskpane/services/config.js"></script>
    <script src="../taskpane/services/wakeword.js"></script>
    <script src="../taskpane/services/ai.js"></script>
    <script src="../taskpane/services/markdown.js"></script>
    <script src="../taskpane/adapters/writer-adapter.js"></script>
    <script src="../taskpane/actions/action-registry.js"></script>
    <script src="../taskpane/actions/prompt-templates.js"></script>
    <script src="../taskpane/components/message.js"></script>
    <script src="../taskpane/components/result-card.js"></script>
    <script src="../taskpane/components/result-panel.js"></script>
    <script src="../taskpane/env.js"></script>
    <script src="floating.js"></script>
</head>
<body>
    <!--
      设计原则: 与 WPS 原生 AI 助手一致
      - 极简: 只有输入区 (textarea + 4 按钮), 没有任何品牌 / 标题
      - 弹出层 (AI 指令菜单 / 结果) 全部以 position: fixed 浮在 WPS 文档上
      - 不再 resize 对话框 (大小固定), 让内容层自然滑出
      - 左上角品牌标记 (16x16): 用于标识浮动对话框归属, 不干扰核心交互
    -->

    <div class="kw-floating-brand" title="开悟 AI 助手">
        <img src="../images/kaiwu.svg" width="16" height="16" alt="开悟" onerror="this.onerror=null;this.style.display='none';this.nextSibling && (this.nextSibling.style.display='inline');">
        <span style="display:none;font-size:10px;color:var(--kw-muted);">开悟</span>
    </div>

    <main class="kw-composer" id="kwShell">
        <textarea id="kwPrompt" class="kw-prompt" placeholder="输入你想生成的内容，例如：写一份项目周报" rows="1"></textarea>
        <div class="kw-toolbar">
            <div class="kw-tools-left">
                <button id="kwAiCmd" class="kw-icon-btn kw-ai-cmd" title="AI 指令" aria-label="AI 指令">
                    <svg class="kw-svg" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2l1.5 5h5l-4 3 1.5 5L12 16l-4.5 4 1.5-5-4-3 5-1.5z" fill="currentColor"/>
                    </svg>
                </button>
                <button id="kwAttach" class="kw-icon-btn" title="添加" aria-label="添加">
                    <svg class="kw-svg" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                    </svg>
                </button>
                <button id="kwDeepThink" class="kw-icon-btn" title="深入研究" aria-label="深入研究">
                    <svg class="kw-svg" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 18h6M10 22h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                        <path d="M12 2a7 7 0 0 0-4 12.7c.7.6 1 1.4 1 2.3h6c0-.9.3-1.7 1-2.3A7 7 0 0 0 12 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
                    </svg>
                </button>
            </div>
            <button id="kwSend" class="kw-send-btn" title="发送" aria-label="发送">
                <svg class="kw-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>
        </div>
    </main>

    <!--
      AI 指令菜单: position: fixed 浮在 WPS 文档上
      位置由 JS 根据 composer.bottom 计算
    -->
    <aside id="kwAiCmdPanel" class="kw-aicmd-panel" hidden>
        <div class="kw-aicmd-list">
            <div class="kw-aicmd-header">AI 帮我写</div>
            <button class="kw-aicmd-item" data-action="write" data-prompt="帮我写一段内容：">
                <span class="kw-aicmd-icon" data-icon="write">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span>AI 帮我写</span>
            </button>
            <button class="kw-aicmd-item" data-action="continue_write" data-require-selection="1">
                <span class="kw-aicmd-icon" data-icon="continue">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span>续写</span>
            </button>
            <button class="kw-aicmd-item" data-action="imitate" data-require-selection="1">
                <span class="kw-aicmd-icon" data-icon="imitate">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/>
                        <rect x="7" y="7" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/>
                    </svg>
                </span>
                <span>仿写</span>
            </button>
            <button class="kw-aicmd-item" data-action="write" data-prompt="请作为写作搭档，基于我的要求给出正文：">
                <span class="kw-aicmd-icon" data-icon="cowrite">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.6" fill="none"/>
                        <path d="M3 21v-1a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                        <path d="M16 6l4 2-2 4M17 13l3-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span>伴写</span>
            </button>
            <button class="kw-aicmd-item" data-action="write" data-prompt="请生成一份结构清晰的文章大纲，主题是：">
                <span class="kw-aicmd-icon" data-icon="outline">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <line x1="8" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="8" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <line x1="8" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        <circle cx="4" cy="6" r="1.2" fill="currentColor"/>
                        <circle cx="4" cy="12" r="1.2" fill="currentColor"/>
                        <circle cx="4" cy="18" r="1.2" fill="currentColor"/>
                    </svg>
                </span>
                <span>文章大纲</span>
            </button>
            <button class="kw-aicmd-item" data-action="write" data-prompt="请生成一份自然得体的讲话稿，主题和场景是：">
                <span class="kw-aicmd-icon" data-icon="speech">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="9" y="3" width="6" height="11" rx="3" stroke="currentColor" stroke-width="1.6" fill="none"/>
                        <path d="M5 11a7 7 0 0 0 14 0M12 18v3M9 21h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                    </svg>
                </span>
                <span>讲话稿</span>
            </button>
            <button class="kw-aicmd-item" data-action="write" data-prompt="请生成一篇心得体会，主题是：">
                <span class="kw-aicmd-icon" data-icon="thoughts">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 18h6M10 22h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                        <path d="M12 2a7 7 0 0 0-4 12.7c.7.6 1 1.4 1 2.3h6c0-.9.3-1.7 1-2.3A7 7 0 0 0 12 2z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span>心得体会</span>
            </button>
            <button class="kw-aicmd-item" data-action="write" data-prompt="请根据以下内容整理会议纪要：">
                <span class="kw-aicmd-icon" data-icon="minutes">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="5" y="4" width="14" height="18" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/>
                        <path d="M9 4V3a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                        <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </span>
                <span>会议纪要</span>
            </button>
        </div>
    </aside>

    <!--
      结果区: position: fixed 浮在 WPS 上, 与 AI 指令菜单同位置策略
    -->
    <section id="kwResult" class="kw-result" hidden>
        <div class="kw-result-header">
            <div class="kw-result-title">回答</div>
            <div class="kw-result-header-actions">
                <button id="kwCollapse" class="kw-collapse-btn" title="收起为浮窗" aria-label="收起">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    </svg>
                </button>
                <button id="kwClear" class="kw-collapse-btn" title="清除" aria-label="清除">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 7h14M9 7V4.5h6V7M7 7l1 13a1.5 1.5 0 0 0 1.5 1.4h5a1.5 1.5 0 0 0 1.5-1.4L17 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="kwAnswer" class="kw-answer markdown-body"></div>
        <div class="kw-result-actions" id="kwResultActions" hidden>
            <button id="kwInsert" class="kw-action-btn">插入文档</button>
            <button id="kwReplace" class="kw-action-btn kw-primary-action">替换选区</button>
            <button id="kwCopy" class="kw-action-btn">复制</button>
        </div>
    </section>

    <!-- 折叠后的浮窗小芯片 -->
    <div id="kwMiniChip" class="kw-mini-chip" hidden title="点击恢复">
        <span id="kwMiniChipText">已生成结果</span>
        <svg viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3 6h6M6 3l3 3-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
    </div>
</body>
</html>
