<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <title>开悟 Kaiwu — WPS AI 写作助手</title>
  <desc>品牌横幅: 打开的书页 + 智慧之光 + 项目名称 + 标语</desc>

  <!-- 背景 -->
  <rect width="800" height="200" rx="12" fill="#fafbfc"/>

  <!-- 左侧: LOGO 图标 (放大版 kaiwu.svg) -->
  <g transform="translate(60, 32) scale(3.5)">
    <!-- 左侧书页 -->
    <path d="M4 7.5c0-.8.7-1.5 1.5-1.5H14c.8 0 1.5.7 1.5 1.5v18c0-.8-.7-1.5-1.5-1.5H5.5c-.8 0-1.5.7-1.5 1.5v-18z"
          fill="#ffffff" stroke="#2f3437" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M7.5 11h5.5M7.5 14.5h5.5M7.5 18h4" stroke="#2f3437" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- 右侧书页 -->
    <path d="M28 7.5c0-.8-.7-1.5-1.5-1.5H18c-.8 0-1.5.7-1.5 1.5v18c0-.8.7-1.5 1.5-1.5h8.5c.8 0 1.5.7 1.5 1.5v-18z"
          fill="#ffffff" stroke="#2f3437" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M19 11h5.5M19 14.5h5.5M19 18h4.5" stroke="#2f3437" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <!-- 中央 4 角星 -->
    <path d="M16 9.2l1.7 4.6 4.7 1.4-4.7 1.4L16 21.2l-1.7-4.6L9.6 15.2l4.7-1.4L16 9.2z" fill="#C00000"/>
    <!-- 光芒 -->
    <path d="M16 3.5v2.4M16 24.5v2.4M3.5 14.2h2.4M26.1 14.2h2.4"
          stroke="#C00000" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    <path d="M6.7 6.7l1.7 1.7M23.6 21.6l1.7 1.7M6.7 23.6l1.7-1.7M23.6 8.4l1.7-1.7"
          stroke="#C00000" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.8"/>
  </g>

  <!-- 右侧: 文字 -->
  <!-- 主标题: 开悟 -->
  <text x="230" y="100" font-family="-apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="56" font-weight="700" fill="#2f3437" letter-spacing="4">开悟</text>

  <!-- 英文名 -->
  <text x="230" y="132" font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="20" font-weight="400" fill="#888" letter-spacing="6">KAIWU</text>

  <!-- 标语 -->
  <text x="230" y="165" font-family="-apple-system, 'Microsoft YaHei', sans-serif"
        font-size="16" fill="#C00000" font-weight="500">AI 写作助手 · WPS Office 插件</text>

  <!-- 分隔线 -->
  <line x1="230" y1="142" x2="520" y2="142" stroke="#eee" stroke-width="1"/>

  <!-- 功能标签 -->
  <g font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#999">
    <text x="230" y="186">对话 · 润色 · 续写 · 翻译 · 摘要 · 仿写 · 伴写 · 排版</text>
  </g>

  <!-- 右上角装饰: 小星星 -->
  <path d="M760 30l4-10 4 10 10 4-10 4-4 10-4-10-10-4 10-4z" fill="#C00000" opacity="0.3"/>
  <path d="M740 55l2.5-6.5 2.5 6.5 6.5 2.5-6.5 2.5-2.5 6.5-2.5-6.5-6.5-2.5 6.5-2.5z" fill="#C00000" opacity="0.2"/>
  <path d="M775 60l2-5 2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#C00000" opacity="0.15"/>
</svg>
