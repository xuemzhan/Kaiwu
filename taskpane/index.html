<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开悟 - AI 写作助手</title>
    <link rel="stylesheet" href="styles/main.css">

    <!-- Markdown 渲染 -->
    <script src="vendor/marked.min.js"></script>
    <link rel="stylesheet" href="vendor/highlight-github.min.css">
    <!-- Mermaid 图表 -->
    <script src="vendor/mermaid.min.js"></script>
    <!-- html2canvas 图片导出 -->
    <script src="vendor/html2canvas.min.js"></script>

    <!-- 服务层 (utils 必须先加载, 后续模块依赖 KwUtils/KwMarkdown) -->
    <script src="services/utils.js"></script>
    <script src="services/toast.js"></script>
    <script src="services/security.js"></script>
    <script src="services/config.js"></script>
    <script src="services/chat.js"></script>
    <script src="services/ai.js"></script>
    <script src="services/ai-factory.js"></script>
    <script src="services/opencode-ai.js"></script>
    <script src="services/session-manager.js"></script>
    <script src="services/wakeword.js"></script>
    <script src="services/markdown.js"></script>
    <script src="adapters/writer-adapter.js"></script>
    <script src="actions/action-registry.js"></script>
    <script src="actions/prompt-templates.js"></script>

    <!-- 组件层 -->
    <script src="components/message.js"></script>
    <script src="components/result-card.js"></script>
    <script src="components/result-panel.js"></script>
    <script src="components/history-drawer.js"></script>
    <script src="components/settings.js"></script>
    <script src="actions/action-runner.js"></script>
    <script src="components/chat.js"></script>

    <!-- 环境变量注入（由 init-env.ps1 生成，gitignored） -->
    <script src="env.js"></script>

    <!-- 应用入口 -->
    <script src="app.js"></script>
</head>
<body>
    <div id="app">
        <!-- 头部 -->
        <header id="appHeader">
            <div class="brand">
                <div class="brand-logo">
                    <img src="styles/robot-icon.svg" alt="开悟" width="36" height="36">
                </div>
                <div class="brand-title">开悟</div>
                <div class="ai-badge">AI</div>
            </div>
            <div class="header-right">
                <button id="btnExportChats" class="header-btn" title="导出对话" aria-label="导出对话">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
                </button>
                <button id="btnImportChats" class="header-btn" title="导入对话" aria-label="导入对话">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" fill="currentColor"/></svg>
                </button>
                <input id="importFileInput" type="file" accept="application/json" style="display:none;">
                <button id="btnHistory" class="header-btn" title="历史记录" aria-label="历史记录">
                    <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button id="btnNewChat" class="header-btn" title="新对话" aria-label="新对话">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
                </button>
                <button id="btnSettings" class="header-btn" title="设置" aria-label="设置">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z" fill="currentColor"/></svg>
                </button>
            </div>
        </header>

        <!-- 快捷操作提示（Phase 2） -->
        <div id="quickActionBar" class="quick-action-bar" style="display:none;">
            <span id="quickActionLabel"></span>
            <div class="quick-action-buttons">
                <button id="btnExecuteAction" class="btn btn-primary btn-sm">✅ 插入文档</button>
                <button id="btnCancelAction" class="btn btn-sm">✕ 取消</button>
            </div>
        </div>

        <section id="contextBar" class="context-bar">
            <h1 class="context-title">文字助手</h1>
            <div class="context-meta" id="contextMeta">文字文稿1 · 未选中文本 · MiniMax-M3</div>
            <button class="doc-btn" title="文档">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z" fill="currentColor"/></svg>
            </button>
        </section>

        <!--
          顶部场景栏: 分类标签 + 场景芯片
          - 空间充足 (>= 560px) 时: 一行展示分类标签 + 所有芯片 (水平滚动)
          - 空间变窄 (< 560px) 时: 分类标签变成 Tabs, 一次只展示当前分类的芯片
        -->
        <nav id="quickActions" class="scenario-strip" role="tablist" aria-label="写作场景">
            <div class="scenario-tabs" role="presentation">
                <button class="scenario-tab is-active" data-category="writing" role="tab" aria-selected="true">创作</button>
                <button class="scenario-tab" data-category="modify" role="tab" aria-selected="false">修改</button>
                <button class="scenario-tab" data-category="document" role="tab" aria-selected="false">文档</button>
            </div>
            <section class="scenario-chips" data-category="writing">
                <button class="scenario-chip is-active" data-action-id="write">帮我写</button>
                <button class="scenario-chip" data-action-id="imitate" data-requires-selection>仿写</button>
                <button class="scenario-chip" data-action-id="cowrite">伴写</button>
                <button class="scenario-chip" data-action-id="polish">润色</button>
                <button class="scenario-chip" data-action-id="more">更多</button>
            </section>
            <div class="scenario-chips" data-category="modify" hidden>
                <button class="scenario-chip" data-action-id="polish_quick">快速润色</button>
                <button class="scenario-chip" data-action-id="polish_formal">更正式</button>
                <button class="scenario-chip" data-action-id="polish_government">党政风</button>
                <button class="scenario-chip" data-action-id="correct">纠错</button>
                <button class="scenario-chip" data-action-id="expand">扩写</button>
                <button class="scenario-chip" data-action-id="shrink">缩写</button>
                <button class="scenario-chip" data-action-id="rewrite">重写</button>
                <button class="scenario-chip" data-action-id="translate">翻译</button>
                <button class="scenario-chip" data-action-id="summarize">摘要</button>
            </div>
            <div class="scenario-chips" data-category="document" hidden>
                <button class="scenario-chip" data-action-id="doc_summary">全文总结</button>
            </div>
        </nav>

        <!--
          统一结果区: TaskPane 与 Floating 共享同一个 ResultPanel 渲染区
          - 默认: 显示最近一次生成结果 (含替换/插入/复制按钮)
          - 多条结果: 在历史抽屉中查看
        -->
        <div id="resultContainer" class="result-container"></div>

        <!-- 对话列表 -->
        <div id="chatContainer" class="chat-container">
            <div class="welcome-message">
                <h3>你好！👋 我是开悟，你的 AI 写作助手，很高兴见到你！</h3>
                <p>我可以帮你处理各种文档和写作相关的任务，比如：</p>
                <ul class="feature-list">
                    <li>
                        <span class="feature-icon blue">✎</span>
                        <strong>写作优化</strong>
                        <span>润色文章、提升表达、改善结构</span>
                    </li>
                    <li>
                        <span class="feature-icon purple">◎</span>
                        <strong>翻译</strong>
                        <span>中英 / 多语言互译</span>
                    </li>
                    <li>
                        <span class="feature-icon green">▤</span>
                        <strong>摘要生成</strong>
                        <span>提炼长文要点、生成摘要</span>
                    </li>
                    <li>
                        <span class="feature-icon orange">✦</span>
                        <strong>内容创作</strong>
                        <span>起草文章、邮件、报告等</span>
                    </li>
                    <li>
                        <span class="feature-icon blue">⌕</span>
                        <strong>文本分析</strong>
                        <span>语法检查、风格建议等</span>
                    </li>
                </ul>
                <p>有什么我可以帮你的吗？ 😊</p>
                <p class="welcome-model" id="welcomeModel"></p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="inputBox" class="input-box" rows="3" placeholder="输入你想生成的内容，例如：写一份项目周报"></textarea>
            </div>
            <div class="input-counter" id="inputCounter"></div>
            <div class="input-toolbar">
                <div class="toolbar-left">
                    <button id="btnClear" class="btn btn-sm" title="清空当前对话 (Ctrl+L)">🗑️ 清空</button>
                </div>
                <div class="toolbar-right">
                    <button class="model-indicator" title="模型选择">
                        <img src="styles/robot-icon.svg" alt="模型" width="24" height="24">
                        <span>MiniMax-M3</span>
                    </button>
                    <button id="btnAbort" class="btn btn-sm btn-abort" style="display:none;" title="停止生成 (Esc)">⏹ 停止</button>
                    <button id="btnSend" class="btn btn-primary">发送</button>
                </div>
            </div>
        </div>

        <!-- 首次运行引导浮层 -->
        <div id="kwFirstRunOverlay" class="kw-first-run-overlay" hidden>
            <div class="kw-first-run-content">
                <h2>👋 欢迎使用开悟 AI 助手</h2>
                <p>请先配置您的 API Key 以开始使用</p>
                <button id="kwFirstRunConfigBtn" class="kw-btn-primary">配置 API Key</button>
                <button id="kwFirstRunDismissBtn" class="kw-btn-secondary">稍后</button>
            </div>
        </div>

        <!-- 设置弹窗 -->
        <div id="settingsOverlay" class="overlay" style="display:none;">
            <div class="overlay-content settings-panel">
                <div class="settings-header">
                    <h3>⚙️ 设置</h3>
                    <button id="btnCloseSettings" class="btn btn-sm">✕</button>
                </div>
                <div class="settings-body" id="settingsBody">
                    <!-- 由 settings.js 动态渲染 -->
                </div>
            </div>
        </div>

        <!--
          历史抽屉: 滑出式 (从右侧), 按稿子/时间分组, 每条含源文+结果
          - 同一文档/同一选区的处理记录归到同一组
          - 支持单条重新插入/复制/删除
        -->
        <aside id="historyDrawer" class="history-drawer" aria-hidden="true">
            <div class="history-header">
                <div class="history-title">历史记录</div>
                <div class="history-actions">
                    <button id="btnHistoryClear" class="btn btn-sm" title="清空全部">清空</button>
                    <button id="btnCloseHistory" class="btn btn-sm" title="关闭">✕</button>
                </div>
            </div>
            <div class="history-search">
                <input id="historySearch" type="text" class="form-input" placeholder="搜索 (源文 / 结果 / 动作)">
            </div>
            <div class="history-meta" id="historyMeta">共 0 条</div>
            <div id="historyList" class="history-list">
                <!-- 由 history-drawer.js 动态渲染 -->
            </div>
        </aside>
        <div id="historyBackdrop" class="history-backdrop" hidden></div>
        <!-- KwToast 静态节点: 默认 channel, 浮动对话框使用 channel='floating' -->
        <div id="kw-toast-default" class="kw-toast"></div>
    </div>

    <script>
        // 应用初始化 - 在 app.js 中完成
        // marked 配置
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: false
                });
            }
            if (typeof hljs !== 'undefined') {
                hljs.configure({ ignoreUnescapedHTML: true });
            }
        });
    </script>
</body>
</html>
